    /* ── Folder Sections ── */
    .folder {
      margin-bottom: 16px;

    .folder-header {
      display: flex; align-items: center; gap: 10px;

    @keyframes dropExpand {

    /* ── Posts ── */

    .hover-grid {

    .video-card .v-info {

    /* ── Posts ── */
    .post-list { display: flex; flex-direction: column; gap: 12px; }
    .post-card {

      #musicBtn {

    #volSlider {
      position: fixed; bottom: 84px; right: 28px; z-index: 9999;
      width: 48px; height: 120px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.16);
      border-left-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);

    }
    #volSlider.show {
      opacity: 1;

    }
    #volSlider input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; outline: none;
      transform: rotate(-90deg);
    }
    #volSlider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      border: none;
    }
    #volSlider input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: none;
    }

    .r0, .r1, .r2, .r3 {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 99999;
      transform: scale(0.2); opacity: 0;
    }
    .r0 {
      backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 40%);
      border: 2px solid rgba(139,108,249,0.2);
      animation: r0 0.9s ease-out forwards;
    }
    .r1 {
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      background: radial-gradient(circle, rgba(139,108,249,0.03) 0%, transparent 50%);
      border: 1.5px solid rgba(139,108,249,0.12);
      animation: r1 0.95s ease-out 0.04s forwards;
    }
    .r2 {
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
      background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 60%);
      border: 1px solid rgba(139,108,249,0.07);
      animation: r2 1s ease-out 0.08s forwards;
    }
    .r3 {
      backdrop-filter: blur(0.5px); -webkit-backdrop-filter: blur(0.5px);
      border: 0.5px solid rgba(139,108,249,0.04);
      animation: r3 1.05s ease-out 0.12s forwards;
    }
    @keyframes r0 {
      0% { transform: scale(0.2); opacity: 0.9; backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px); }
      60% { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
      100% { transform: scale(2.2); opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
    }
    @keyframes r1 {
      0% { transform: scale(0.2); opacity: 0.6; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
      100% { transform: scale(3); opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
    }
    @keyframes r2 {
      0% { transform: scale(0.2); opacity: 0.35; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
      100% { transform: scale(4); opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
    }
    @keyframes r3 {
      0% { transform: scale(0.2); opacity: 0.15; backdrop-filter: blur(0.5px); -webkit-backdrop-filter: blur(0.5px); }
      100% { transform: scale(5.5); opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
    }

    @media (max-width: 600px) {
        .profile { flex-direction: column; text-align: center; padding: 24px 20px; }
        .project-grid { grid-template-columns: 1fr 1fr; }
        .video-grid { grid-template-columns: 1fr; }
        .container { padding: 20px 16px 60px; }
        #musicBtn { bottom: 20px; right: 20px; width: 44px; height: 44px; }
      }

  <body>

    <div class="bg"></div>

    <div class="container">

      <div class="profile-expand-overlay" id="profileOverlay" onclick="collapseProfile()"></div>
      <div class="glass profile" id="profile" onclick="expandProfile()"></div>

    <!-- Videos Folder -->
    <div class="folder">
      <div class="folder-header" onclick="toggleFolder(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <h2>Videos</h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="folder-body" id="videosBody">
        <div class="hover-grid video-grid" id="videos"></div>
      </div>
    </div>

    <!-- Projects Folder -->
    <div class="folder">
      <div class="folder-header" onclick="toggleFolder(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <h2>Projects</h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="folder-body" id="projectsBody">
        <div class="hover-grid project-grid" id="projects"></div>
      </div>
    </div>

    <!-- Posts Folder -->
    <div class="folder">
      <div class="folder-header" onclick="toggleFolder(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <h2>Posts</h2>
        <span class="chevron">&#9660;</span>
      </div>

        <div class="post-list" id="posts"></div>
      </div>

    <div class="footer"></div>

  <audio id="bgAudio" src="Rain Petals.mp3" preload="auto" loop></audio>
  <audio id="dropAudio" src="water-droplet-drip_IQ095jI.mp3" preload="auto"></audio>
  <div id="volSlider">
    <input type="range" id="volRange" min="0" max="1" step="0.01" value="0.2">
  </div>
  <button id="musicBtn" onclick="toggleMusic()" title="Background music" onmouseenter="showVolSlider()" onmouseleave="hideVolSlider()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
  </button>

  <script>
    function toggleFolder(header) {
      const body = header.nextElementSibling;
      header.classList.toggle("open");
      body.classList.toggle("open");
      if (body.classList.contains("open")) {
        animateDropIn(body.querySelector(".hover-grid"));
        animateDropIn(body.querySelector(".post-list"), 100);
      }
    }

    function expandProfile() {
      const el = document.getElementById("profile");
      if (el.classList.contains("expanded")) return;
      const first = el.getBoundingClientRect();
      el.classList.add("expanded");
      document.getElementById("profileOverlay").classList.add("show");
      const last = el.getBoundingClientRect();
      const dx = first.left - last.left;
      const dy = first.top - last.top;
      const sx = first.width / last.width;
      const sy = first.height / last.height;
      el.style.transition = "none";
      el.style.transformOrigin = "center center";
      el.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
      el.offsetHeight;
      el.style.transition = "transform 0.45s cubic-bezier(0.22, 1, 0.36, 1)";
      el.style.transform = "";
      el.addEventListener("transitionend", () => {
        el.style.transition = "";
        el.style.transformOrigin = "";
        el.style.transform = "";
      }, { once: true });
    }
    function collapseProfile() {
      const el = document.getElementById("profile");
      if (!el.classList.contains("expanded")) return;
      const first = el.getBoundingClientRect();
      el.classList.remove("expanded");
      document.getElementById("profileOverlay").classList.remove("show");
      const last = el.getBoundingClientRect();
      const dx = first.left - last.left;
      const dy = first.top - last.top;
      const sx = first.width / last.width;
      const sy = first.height / last.height;
      el.style.transition = "none";
      el.style.transformOrigin = "center center";
      el.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
      el.offsetHeight;
      el.style.transition = "transform 0.45s cubic-bezier(0.22, 1, 0.36, 1)";
      el.style.transform = "";
      el.addEventListener("transitionend", () => {
        el.style.transition = "";
        el.style.transformOrigin = "";
        el.style.transform = "";
      }, { once: true });
    }

    function animateDropIn(container, stagger = 100) {
      if (!container) return;
      Array.from(container.children).forEach((el, i) => {
        const delay = i * stagger;
        el.style.animation = `dropExpand 1.1s cubic-bezier(0.22, 1, 0.36, 1) ${delay}ms forwards`;
        setTimeout(() => {
          el.style.animation = '';
        }, delay + 1000);
      });
    }

    const LANG_COLORS = {
      "JavaScript": "#f1e05a",
      "HTML":       "#e34c26",
      "Batchfile":  "#c1f12e",
      "Python":     "#3572a5",
      "TypeScript": "#3178c6",
      "Rust":       "#dea584",
      "CSS":        "#563d7c"
    };

    const POSTS = [
      {
        date: "2026-05-26",
        title: "LineageOS 23.2 GSI guide published",
        body: "Updated the Redmi Pad Pro guide to cover the 23.0 → 23.2 update path.\nNo-data-loss upgrade steps, plus KernelSU root instructions.",
        tags: ["dizi", "lineageos", "android16"]
      },
    ].reverse();

    // ── YouTube channel ID (auto-detected, paste once if it changes) ──
    const YT_CHANNEL_ID = "UCU78y1481tZraroe93TFCUg";
    const YT_CHANNEL = "https://www.youtube.com/@Toaxxi";
    const YT_RSS = `https://www.youtube.com/feeds/videos.xml?channel_id=${YT_CHANNEL_ID}`;

    async function renderProfile() {
      const el = document.getElementById("profile");
      try {
        const res = await fetch("https://api.github.com/users/Tokiw0-3");
        if (!res.ok) throw new Error("API error");
        const u = await res.json();
        el.innerHTML = `
          <div class="avatar-wrap">
            <img class="profile-avatar" src="${u.avatar_url}" alt="${u.login}">
          </div>
          <div class="profile-info">
            <h1>${u.name || u.login}</h1>
            <span class="tag">${u.login}</span>
            <div class="bio">${u.bio || ''}</div>
          </div>
          <div class="profile-extras">
            <a href="https://github.com/Tokiw0-3" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
              GitHub
            </a>
            <a href="https://www.youtube.com/@Toaxxi" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
              YouTube
            </a>
            <div class="about-me">Nyan /ᐠ｡ꞈ｡ᐟ\</div>
          </div>`;
      } catch {
        el.innerHTML = `<div style="padding:28px;text-align:center;color:var(--text-dim);width:100%;">Could not load profile.</div>`;
      }
    }

    async function renderProjects() {
      const el = document.getElementById("projects");
      try {
        const res = await fetch("https://api.github.com/users/Tokiw0-3/repos?sort=updated&per_page=50");
        if (!res.ok) throw new Error("API error");
        const repos = await res.json();
        el.innerHTML = repos
          .filter(r => !r.fork && r.name !== "Landing-page")
          .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
          .map((r) => `
            <a class="glass project-card" href="${r.html_url}" target="_blank" rel="noopener">
              <h3>
                <span class="lang-dot" style="background:${LANG_COLORS[r.language]||'#888'}"></span>
                ${r.name}
              </h3>
              <div class="desc-wrap">${r.description ? `<p>${r.description}</p>` : ''}</div>
              <div class="meta">
                <span>${r.language || '—'}</span>
                <span>★ ${r.stargazers_count}</span>
              </div>
            </a>
          `).join("");
      } catch {
        el.innerHTML = `<div class="glass project-card" style="grid-column:1/-1;text-align:center;color:var(--text-dim);padding:28px;">Could not load repos.</div>`;
      }
    }

    async function renderVideos() {
      const el = document.getElementById("videos");
      const rssUrl = encodeURIComponent(YT_RSS);
      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
        if (!res.ok) throw new Error("API error");
        const data = await res.json();
        if (data.status !== "ok" || !data.items?.length) throw new Error("No videos");
        el.innerHTML = data.items.map((v) => {
          const id = (v.guid || "").replace("yt:video:", "");
          const isShort = v.link?.includes("/shorts/");
          return `
          <a class="video-card" href="https://www.youtube.com/${isShort ? 'shorts/' : 'watch?v='}${id}" target="_blank" rel="noopener">
            <div class="thumb-wrap" style="position:relative;">
              <img src="${v.thumbnail || `https://img.youtube.com/vi/${id}/mqdefault.jpg`}" alt="${v.title}" loading="lazy">
              <div class="play-icon">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
            <div class="v-info">
              <div class="v-title">${v.title}</div>
              <div class="v-date">${(v.pubDate || "").slice(0, 10)}${isShort ? ' &middot; Short' : ''}</div>
            </div>
          </a>`;
        }).join("");
      } catch {
        el.innerHTML = `<div class="glass video-card" style="grid-column:1/-1;align-items:center;justify-content:center;padding:28px;text-align:center;color:var(--text-dim);">
          <p style="margin-bottom:8px;">Could not load videos.</p>
          <a href="${YT_CHANNEL}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-size:0.85rem;">Visit my YouTube channel &rarr;</a>
        </div>`;
      }
    }

    function renderPosts() {
      const el = document.getElementById("posts");
      if (!POSTS.length) {
        el.innerHTML = `<div class="glass post-card" style="text-align:center;color:var(--text-dim);padding:28px;">No posts yet.</div>`;
        return;
      }
      el.innerHTML = POSTS.map(p => `
        <div class="glass post-card">
          <div class="post-date">${p.date}</div>
          <div class="post-title">${p.title}</div>
          ${p.body ? `<div class="post-body">${p.body}</div>` : ''}
          ${p.tags && p.tags.length ? `<div class="post-tags">${p.tags.map(t => `<span>${t}</span>`).join('')}</div>` : ''}
        </div>
      `).join("");
    }

    function animateDropIn(container, stagger = 60) {
      const items = container?.children;
      if (!items) return;
      Array.from(items).forEach((el, i) => {
        const delay = i * stagger;
        el.style.opacity = '0';
        el.style.transform = 'scale(0.08) translateY(-20px)';
        el.style.borderRadius = '50%';
        requestAnimationFrame(() => {
          el.style.transition = `all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) ${delay}ms`;
          el.style.opacity = '1';
          el.style.transform = '';
          el.style.borderRadius = '';
        });
        setTimeout(() => {
          el.style.transition = '';
          el.style.opacity = '';
        }, delay + 600);
      });
    }

    var audio = document.getElementById('bgAudio');
    var musicStarted = false;
    audio.volume = 0.1;
    audio.play().then(function() {
      musicStarted = true;
      document.getElementById('musicBtn').classList.remove('paused');
    }).catch(function() {});
    document.getElementById('volRange').addEventListener('input', function() {
      audio.volume = this.value;
    });
    function toggleMusic() {
      if (audio.paused) { audio.play(); document.getElementById('musicBtn').classList.remove('paused'); }
      else { audio.pause(); document.getElementById('musicBtn').classList.add('paused'); }
    }
    var volTimer;
    function showVolSlider() { clearTimeout(volTimer); document.getElementById('volSlider').classList.add('show'); }
    function hideVolSlider() { volTimer = setTimeout(function() { document.getElementById('volSlider').classList.remove('show'); }, 400); }
    document.getElementById('volSlider').addEventListener('mouseenter', showVolSlider);
    document.getElementById('volSlider').addEventListener('mouseleave', hideVolSlider);

    var dropAudio = document.getElementById('dropAudio');
    document.addEventListener('click', function(e) {
      if (!musicStarted) {
        audio.play();
        musicStarted = true;
        document.getElementById('musicBtn').classList.remove('paused');
      }
      dropAudio.currentTime = 0;
      dropAudio.play();
      var s = Math.min(window.innerWidth, window.innerHeight) * 0.15;
      var x = e.clientX - s/2;
      var y = e.clientY - s/2;
      ['r0','r1','r2','r3'].forEach(function(cls) {
        var el = document.createElement('div');
        el.className = cls;
        el.style.cssText = 'width:'+s+'px;height:'+s+'px;left:'+x+'px;top:'+y+'px;';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1200);
      });
    });

    renderProfile();
    renderProjects();
    renderVideos();
    renderPosts();
  </script>
</body>
</html>
